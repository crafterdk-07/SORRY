<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Really Sorry 💔</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow:hidden;
}

.container{
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(15px);
    padding:40px;
    border-radius:25px;
    width:350px;
    box-shadow:0 0 30px rgba(255,105,180,0.5);
    animation: fadeIn 2s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

h1{
    color:#fff;
    margin-bottom:15px;
}

p{
    color:#fff;
    font-size:16px;
    margin-bottom:25px;
    line-height:1.6;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:#ff4e8a;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 0 15px #ff4e8a;
}

button:hover{
    transform:scale(1.1);
    box-shadow:0 0 25px #ff4e8a;
}

.heart{
    position:fixed;
    bottom:-10px;
    font-size:20px;
    animation: float 6s linear infinite;
}

@keyframes float{
    0%{transform:translateY(0) rotate(0deg);}
    100%{transform:translateY(-100vh) rotate(360deg);}
}

.message{
    margin-top:20px;
    font-size:18px;
    color:#fff;
    font-weight:bold;
}
</style>
</head>

<body>

<!-- Background Music -->
<audio autoplay loop>
    <source src="sorry.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <h1>I'm Really Sorry 💔</h1>
    <p>
        I never wanted to hurt you.  
        You are very special to me.  
        Please forgive me if I made a mistake.  
        I truly value our friendship ❤️
    </p>

    <button onclick="forgive()">Forgive Me ? 🥺</button>

    <div class="message" id="msg"></div>
</div>

<script>

function forgive(){
    document.getElementById("msg").innerHTML = 
    "Thank you for understanding 💖 You mean a lot to me 🌸";
}

// Floating Hearts
setInterval(function(){
    var heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(heart);

    setTimeout(function(){
        heart.remove();
    },6000);

},500);

// Autoplay fix (browser restriction)
window.addEventListener("click", function() {
    const audio = document.querySelector("audio");
    audio.play();
}, { once: true });

</script>

</body>
</html>
